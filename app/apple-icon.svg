    </filter>
    <filter id="g3" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="15" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="cg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5f3fc" stop-opacity="1"/>
      <stop offset="60%" stop-color="#67e8f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="none" stroke="#1e2847" stroke-width="5"/>
  <g transform="translate(46, 46) scale(5.25)">
    <circle cx="40" cy="40" r="36" stroke="#3b82f6" stroke-width="1" fill="none" filter="url(#g1)" stroke-dasharray="6 10"/>
    <circle cx="40" cy="40" r="30" stroke="#60a5fa" stroke-width="1.5" fill="none" filter="url(#g2)"/>
    <circle cx="40" cy="40" r="23" stroke="#818cf8" stroke-width="2" fill="none" filter="url(#g2)"/>
    <circle cx="40" cy="40" r="16" stroke="#a78bfa" stroke-width="2.5" fill="none" filter="url(#g2)"/>
    <circle cx="40" cy="40" r="9.5" stroke="#c084fc" stroke-width="2" fill="none" filter="url(#g2)"/>
    <circle cx="40" cy="40" r="9" fill="url(#cg)" opacity="0.4" filter="url(#g3)"/>
    <circle cx="40" cy="40" r="3.5" fill="#a5f3fc" filter="url(#g3)"/>
