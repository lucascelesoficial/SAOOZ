<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="ring3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="ring4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="80"/>

  <!-- Outer ring (largest) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ring1)" stroke-width="2.5" opacity="0.7" filter="url(#glow)"/>

  <!-- Second ring -->
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring2)" stroke-width="3" opacity="0.8" filter="url(#glow)"/>

  <!-- Third ring -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="url(#ring3)" stroke-width="4" opacity="0.9" filter="url(#glow)"/>

  <!-- Fourth ring -->
  <circle cx="256" cy="256" r="85" fill="none" stroke="url(#ring2)" stroke-width="5" filter="url(#glow-strong)"/>

  <!-- Fifth ring (inner) -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="url(#ring4)" stroke-width="6" filter="url(#glow-strong)"/>

  <!-- Center dot / innermost circle -->
  <circle cx="256" cy="256" r="28" fill="none" stroke="url(#ring3)" stroke-width="4" filter="url(#glow-strong)"/>

  <!-- Highlight glint at top -->
  <circle cx="224" cy="178" r="4" fill="white" opacity="0.6" filter="url(#glow)"/>
</svg>
