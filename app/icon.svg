<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="40%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="g2" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="45%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="g3" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-md">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>

  <!-- Ring 1 — outermost, thin -->
  <circle cx="256" cy="256" r="242" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.75" filter="url(#glow-sm)"/>

  <!-- Ring 2 -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#g2)" stroke-width="3" opacity="0.8" filter="url(#glow-sm)"/>

  <!-- Ring 3 — thick band start -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#g3)" stroke-width="22" opacity="0.9" filter="url(#glow-md)"/>

  <!-- Ring 3 inner edge crisp -->
  <circle cx="256" cy="256" r="154" fill="none" stroke="url(#g4)" stroke-width="2" opacity="0.6"/>

  <!-- Ring 4 — thick inner band -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#g2)" stroke-width="18" opacity="0.95" filter="url(#glow-md)"/>

  <!-- Ring 5 — innermost thick ring -->
  <circle cx="256" cy="256" r="105" fill="none" stroke="url(#g3)" stroke-width="14" filter="url(#glow-lg)"/>

  <!-- Inner gap ring -->
  <circle cx="256" cy="256" r="88" fill="none" stroke="url(#g1)" stroke-width="3" opacity="0.7" filter="url(#glow-sm)"/>

  <!-- Center hole ring -->
  <circle cx="256" cy="256" r="75" fill="none" stroke="url(#g4)" stroke-width="2" opacity="0.5"/>

  <!-- Glint top-center on outermost ring -->
  <ellipse cx="256" cy="16" rx="18" ry="6" fill="white" opacity="0.9" filter="url(#glow-lg)"/>
  <ellipse cx="256" cy="14" rx="6" ry="3" fill="white" opacity="1"/>

  <!-- Glint left side subtle -->
  <ellipse cx="14" cy="290" rx="4" ry="8" fill="white" opacity="0.4" filter="url(#glow-sm)"/>
</svg>
